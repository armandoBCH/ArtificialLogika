<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>IG Post 2 — Así Trabajamos</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>

<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
        <defs>
            <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                <line x1="0" y1="0" x2="0" y2="40" stroke="#1A1A1A" stroke-width="0.5" opacity="0.05" />
                <line x1="0" y1="0" x2="40" y2="0" stroke="#1A1A1A" stroke-width="0.5" opacity="0.05" />
            </pattern>
        </defs>

        <!-- BG: Electric Violet principal -->
        <rect width="1080" height="1080" fill="#8523E1" />
        <rect width="1080" height="1080" fill="url(#grid)" />

        <!-- Formas grandes de fondo -->
        <circle cx="1100" cy="200" r="300" fill="#FFFFFF" opacity="0.04" />
        <circle cx="-50" cy="900" r="250" fill="#00D68F" opacity="0.08" />
        <rect x="-80" y="100" width="250" height="250" rx="20" fill="#FDE047" opacity="0.05"
            transform="rotate(-15, 40, 225)" />
        <!-- Semicírculo top -->
        <circle cx="540" cy="-120" r="200" fill="#FFFFFF" opacity="0.03" />

        <!-- Formas medianas -->
        <circle cx="100" cy="150" r="15" fill="#FDE047" opacity="0.3" />
        <circle cx="960" cy="500" r="10" fill="#FFFFFF" opacity="0.2" />
        <circle cx="80" cy="600" r="22" fill="#FF6B6B" opacity="0.15" />
        <rect x="920" y="130" width="24" height="24" rx="4" fill="#00D68F" opacity="0.2"
            transform="rotate(25, 932, 142)" />
        <rect x="180" y="380" width="18" height="18" rx="3" fill="#FDE047" opacity="0.25"
            transform="rotate(40, 189, 389)" />
        <!-- Sparkle -->
        <g transform="translate(950, 800)" opacity="0.15">
            <line x1="0" y1="-10" x2="0" y2="10" stroke="#FFFFFF" stroke-width="2" />
            <line x1="-10" y1="0" x2="10" y2="0" stroke="#FFFFFF" stroke-width="2" />
            <line x1="-7" y1="-7" x2="7" y2="7" stroke="#FFFFFF" stroke-width="1.5" />
        </g>
        <!-- Cruz -->
        <line x1="900" y1="370" x2="900" y2="410" stroke="#FDE047" stroke-width="3" opacity="0.2" />
        <line x1="880" y1="390" x2="920" y2="390" stroke="#FDE047" stroke-width="3" opacity="0.2" />
        <!-- Anillo dash -->
        <circle cx="850" cy="900" r="60" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="10 8"
            opacity="0.08" />
        <!-- Triángulo -->
        <polygon points="150,830 180,880 120,880" fill="#FDE047" opacity="0.12" />

        <!-- Detalles de borde -->
        <line x1="40" y1="40" x2="40" y2="110" stroke="#FFFFFF" stroke-width="2.5" opacity="0.15" />
        <line x1="40" y1="40" x2="110" y2="40" stroke="#FFFFFF" stroke-width="2.5" opacity="0.15" />
        <line x1="1040" y1="1040" x2="1040" y2="970" stroke="#FFFFFF" stroke-width="2.5" opacity="0.15" />
        <line x1="1040" y1="1040" x2="970" y2="1040" stroke="#FFFFFF" stroke-width="2.5" opacity="0.15" />
        <rect x="1072" y="350" width="8" height="180" fill="#00D68F" opacity="0.25" rx="4" />

        <!-- ===== CONTENIDO ===== -->

        <!-- Badge -->
        <g transform="translate(540, 120) rotate(-2)">
            <rect x="-130" y="-22" width="260" height="44" rx="22" fill="#FDE047" stroke="#1A1A1A" stroke-width="3" />
            <text x="0" y="6" font-family="Space Grotesk" font-weight="600" font-size="15" fill="#1A1A1A"
                text-anchor="middle" letter-spacing="0.06em">⚡ ASÍ DE SIMPLE</text>
        </g>

        <!-- Título -->
        <text x="540" y="220" font-family="Space Grotesk" font-weight="700" font-size="48" fill="#FFFFFF"
            text-anchor="middle" letter-spacing="-0.02em">DE TU IDEA</text>
        <text x="540" y="280" font-family="Space Grotesk" font-weight="700" font-size="48" fill="#FFFFFF"
            text-anchor="middle" letter-spacing="-0.02em">A TU WEB EN</text>
        <text x="540" y="350" font-family="Space Grotesk" font-weight="700" font-size="56" fill="#FDE047"
            text-anchor="middle" letter-spacing="-0.02em">4 PASOS</text>

        <!-- Step Cards -->
        <!-- Step 1 -->
        <g transform="translate(150, 420)">
            <rect x="0" y="0" width="780" height="100" rx="12" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="3" />
            <rect x="4" y="4" width="780" height="100" rx="12" fill="none" stroke="none" />
            <!-- Number -->
            <rect x="20" y="20" width="60" height="60" rx="10" fill="#00D68F" stroke="#1A1A1A" stroke-width="3" />
            <text x="50" y="60" font-family="Space Grotesk" font-weight="700" font-size="28" fill="#FFFFFF"
                text-anchor="middle">01</text>
            <!-- Text -->
            <text x="100" y="42" font-family="Space Grotesk" font-weight="700" font-size="22" fill="#1A1A1A">Contanos tu
                idea</text>
            <text x="100" y="72" font-family="Space Grotesk" font-weight="400" font-size="17" fill="#6B6B6B">Nos decís
                qué necesitás y nosotros proponemos</text>
        </g>

        <!-- Step 2 -->
        <g transform="translate(150, 535)">
            <rect x="0" y="0" width="780" height="100" rx="12" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="3" />
            <rect x="20" y="20" width="60" height="60" rx="10" fill="#4A90FF" stroke="#1A1A1A" stroke-width="3" />
            <text x="50" y="60" font-family="Space Grotesk" font-weight="700" font-size="28" fill="#FFFFFF"
                text-anchor="middle">02</text>
            <text x="100" y="42" font-family="Space Grotesk" font-weight="700" font-size="22" fill="#1A1A1A">Diseñamos
                tu web</text>
            <text x="100" y="72" font-family="Space Grotesk" font-weight="400" font-size="17" fill="#6B6B6B">Te
                mostramos el diseño. Vos decís "me gusta" o "cambiá esto"</text>
        </g>

        <!-- Step 3 -->
        <g transform="translate(150, 650)">
            <rect x="0" y="0" width="780" height="100" rx="12" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="3" />
            <rect x="20" y="20" width="60" height="60" rx="10" fill="#8523E1" stroke="#1A1A1A" stroke-width="3" />
            <text x="50" y="60" font-family="Space Grotesk" font-weight="700" font-size="28" fill="#FFFFFF"
                text-anchor="middle">03</text>
            <text x="100" y="42" font-family="Space Grotesk" font-weight="700" font-size="22" fill="#1A1A1A">Lo
                publicamos todo</text>
            <text x="100" y="72" font-family="Space Grotesk" font-weight="400" font-size="17" fill="#6B6B6B">Dominio,
                hosting, SSL, emails — nos encargamos de TODO</text>
        </g>

        <!-- Step 4 -->
        <g transform="translate(150, 765)">
            <rect x="0" y="0" width="780" height="100" rx="12" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="3" />
            <rect x="20" y="20" width="60" height="60" rx="10" fill="#FF6B6B" stroke="#1A1A1A" stroke-width="3" />
            <text x="50" y="60" font-family="Space Grotesk" font-weight="700" font-size="28" fill="#FFFFFF"
                text-anchor="middle">04</text>
            <text x="100" y="42" font-family="Space Grotesk" font-weight="700" font-size="22" fill="#1A1A1A">¡Tu web
                está online! 🎉</text>
            <text x="100" y="72" font-family="Space Grotesk" font-weight="400" font-size="17" fill="#6B6B6B">Lista para
                recibir clientes las 24 horas, los 7 días</text>
        </g>

        <!-- Subtexto -->
        <text x="540" y="920" font-family="Space Grotesk" font-weight="500" font-size="22" fill="#FFFFFF"
            text-anchor="middle" opacity="0.85">Vos atendé tu negocio. De la web nos encargamos nosotros.</text>

        <!-- ===== FIRMA ===== -->
        <line x1="340" y1="970" x2="740" y2="970" stroke="#FDE047" stroke-width="3" />
        <text x="540" y="1000" font-family="Space Grotesk" font-weight="700" font-size="20" fill="#FFFFFF"
            text-anchor="middle" letter-spacing="0.05em">LOGIKA</text>
        <text x="540" y="1025" font-family="Space Grotesk" font-weight="400" font-size="14" fill="#FFFFFF"
            text-anchor="middle" opacity="0.7">artificiallogika.com</text>
    </svg>
</body>

</html>
