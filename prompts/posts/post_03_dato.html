<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>IG Post 3 — Dato Estadística</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>

<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
        <defs>
            <pattern id="cross" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                <line x1="18" y1="14" x2="22" y2="14" stroke="#1A1A1A" stroke-width="1" opacity="0.06" />
                <line x1="20" y1="12" x2="20" y2="16" stroke="#1A1A1A" stroke-width="1" opacity="0.06" />
            </pattern>
        </defs>

        <!-- BG -->
        <rect width="1080" height="1080" fill="#F5F5F5" />
        <rect width="1080" height="1080" fill="url(#cross)" />

        <!-- Formas grandes -->
        <circle cx="1050" cy="100" r="250" fill="#FF6B6B" opacity="0.06" />
        <circle cx="50" cy="1000" r="300" fill="#8523E1" opacity="0.05" />
        <rect x="750" y="800" width="350" height="350" rx="30" fill="#FDE047" opacity="0.05"
            transform="rotate(10, 925, 975)" />
        <!-- Anillo grande -->
        <circle cx="200" cy="180" r="120" fill="none" stroke="#00D68F" stroke-width="25" opacity="0.06" />

        <!-- Formas medianas -->
        <circle cx="920" cy="450" r="14" fill="#8523E1" opacity="0.25" />
        <circle cx="160" cy="550" r="10" fill="#FF6B6B" opacity="0.3" />
        <circle cx="870" cy="780" r="20" fill="#00D68F" opacity="0.2" />
        <rect x="100" y="350" width="22" height="22" rx="4" fill="#FDE047" opacity="0.3"
            transform="rotate(35, 111, 361)" />
        <rect x="950" y="620" width="26" height="26" rx="5" fill="#4A90FF" opacity="0.2"
            transform="rotate(20, 963, 633)" />
        <!-- Sparkle left -->
        <g transform="translate(130, 750)" opacity="0.18">
            <line x1="0" y1="-12" x2="0" y2="12" stroke="#8523E1" stroke-width="2.5" />
            <line x1="-12" y1="0" x2="12" y2="0" stroke="#8523E1" stroke-width="2.5" />
        </g>
        <!-- Cruz right -->
        <line x1="980" y1="280" x2="980" y2="320" stroke="#00D68F" stroke-width="3.5" opacity="0.2" />
        <line x1="960" y1="300" x2="1000" y2="300" stroke="#00D68F" stroke-width="3.5" opacity="0.2" />
        <!-- Estrella 4 puntas -->
        <path d="M200 460 L208 440 L216 460 L236 452 L216 460 L208 480 L200 460 L180 452 Z" fill="#FDE047"
            opacity="0.3" />
        <!-- Triángulo -->
        <polygon points="850,170 880,220 820,220" fill="#FF6B6B" opacity="0.12" />
        <!-- Anillo dash -->
        <circle cx="750" cy="900" r="45" fill="none" stroke="#8523E1" stroke-width="2" stroke-dasharray="8 6"
            opacity="0.1" />

        <!-- Detalles de borde -->
        <line x1="50" y1="50" x2="50" y2="130" stroke="#1A1A1A" stroke-width="3" opacity="0.1" />
        <line x1="50" y1="50" x2="130" y2="50" stroke="#1A1A1A" stroke-width="3" opacity="0.1" />
        <line x1="1030" y1="1030" x2="1030" y2="950" stroke="#1A1A1A" stroke-width="3" opacity="0.1" />
        <line x1="1030" y1="1030" x2="950" y2="1030" stroke="#1A1A1A" stroke-width="3" opacity="0.1" />
        <rect x="0" y="300" width="8" height="160" fill="#FF6B6B" opacity="0.2" rx="4" />
        <line x1="600" y1="60" x2="800" y2="60" stroke="#1A1A1A" stroke-width="2" stroke-dasharray="8 6"
            opacity="0.06" />

        <!-- ===== CONTENIDO ===== -->

        <!-- Badge -->
        <g transform="translate(540, 150) rotate(2)">
            <rect x="-100" y="-22" width="200" height="44" rx="22" fill="#FF6B6B" stroke="#1A1A1A" stroke-width="3" />
            <text x="0" y="6" font-family="Space Grotesk" font-weight="600" font-size="15" fill="#FFFFFF"
                text-anchor="middle" letter-spacing="0.06em">📊 DATO CLAVE</text>
        </g>

        <!-- Número gigante -->
        <text x="540" y="380" font-family="Space Grotesk" font-weight="700" font-size="180" fill="#1A1A1A"
            text-anchor="middle" letter-spacing="-0.03em">8<tspan fill="#8523E1">/</tspan>10</text>

        <!-- Descripción principal -->
        <text x="540" y="460" font-family="Space Grotesk" font-weight="600" font-size="32" fill="#1A1A1A"
            text-anchor="middle">personas buscan tu negocio</text>
        <text x="540" y="505" font-family="Space Grotesk" font-weight="600" font-size="32" fill="#1A1A1A"
            text-anchor="middle">en <tspan fill="#8523E1" font-weight="700">Google</tspan> antes de visitarte.</text>

        <!-- Línea separadora -->
        <line x1="380" y1="550" x2="700" y2="550" stroke="#8523E1" stroke-width="3" />

        <!-- Pregunta/reflexión card -->
        <g transform="translate(540, 640)">
            <rect x="-340" y="-50" width="680" height="100" rx="14" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="3" />
            <!-- Shadow -->
            <rect x="-336" y="-46" width="680" height="100" rx="14" fill="#1A1A1A" opacity="0"
                transform="translate(4,4)" />
            <text x="0" y="-8" font-family="Space Grotesk" font-weight="500" font-size="24" fill="#6B6B6B"
                text-anchor="middle">¿Qué encuentran cuando buscan</text>
            <text x="0" y="28" font-family="Space Grotesk" font-weight="700" font-size="28" fill="#1A1A1A"
                text-anchor="middle">el nombre de <tspan fill="#8523E1">TU</tspan> negocio?</text>
        </g>

        <!-- Dos opciones visuales -->
        <!-- Opción A -->
        <g transform="translate(310, 790)">
            <rect x="-130" y="-35" width="260" height="70" rx="10" fill="#FF6B6B" stroke="#1A1A1A" stroke-width="3"
                opacity="0.15" />
            <rect x="-130" y="-35" width="260" height="70" rx="10" fill="none" stroke="#1A1A1A" stroke-width="3" />
            <text x="0" y="-5" font-family="Space Grotesk" font-weight="700" font-size="18" fill="#1A1A1A"
                text-anchor="middle">❌ Nada</text>
            <text x="0" y="20" font-family="Space Grotesk" font-weight="400" font-size="14" fill="#6B6B6B"
                text-anchor="middle">No aparecés en ningún lado</text>
        </g>

        <!-- Opción B -->
        <g transform="translate(770, 790)">
            <rect x="-130" y="-35" width="260" height="70" rx="10" fill="#00D68F" stroke="#1A1A1A" stroke-width="3"
                opacity="0.15" />
            <rect x="-130" y="-35" width="260" height="70" rx="10" fill="none" stroke="#1A1A1A" stroke-width="3" />
            <text x="0" y="-5" font-family="Space Grotesk" font-weight="700" font-size="18" fill="#1A1A1A"
                text-anchor="middle">✅ Tu web profesional</text>
            <text x="0" y="20" font-family="Space Grotesk" font-weight="400" font-size="14" fill="#6B6B6B"
                text-anchor="middle">Generando confianza 24/7</text>
        </g>

        <!-- CTA -->
        <text x="540" y="900" font-family="Space Grotesk" font-weight="500" font-size="20" fill="#6B6B6B"
            text-anchor="middle">Guardá este post y pensá en tu negocio 💡</text>

        <!-- ===== FIRMA ===== -->
        <line x1="340" y1="970" x2="740" y2="970" stroke="#8523E1" stroke-width="3" />
        <text x="540" y="1000" font-family="Space Grotesk" font-weight="700" font-size="20" fill="#1A1A1A"
            text-anchor="middle" letter-spacing="0.05em">LOGIKA</text>
        <text x="540" y="1025" font-family="Space Grotesk" font-weight="400" font-size="14" fill="#6B6B6B"
            text-anchor="middle">artificiallogika.com</text>
    </svg>
</body>

</html>
