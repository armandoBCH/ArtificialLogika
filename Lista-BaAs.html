<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IG Post — Logika Carousel (Footer Nuevo)</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #1a1a1a;
      padding: 40px;
      display: flex;
      gap: 50px;
      overflow-x: auto;
      min-height: 100vh;
      align-items: center;
    }

    .slide-card {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #2c2c2c;
      padding: 12px 20px;
      border-radius: 12px;
      border: 2px solid #3c3c3c;
    }

    .toolbar-title {
      color: #fff;
      font-weight: 600;
      font-size: 18px;
    }

    .copy-btn {
      background: #4A90FF;
      color: #1A1A1A;
      border: 3px solid #1A1A1A;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 2px 2px 0px #1A1A1A;
      transition: all 0.1s ease;
    }

    .copy-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px #1A1A1A;
    }

    .slide-wrapper {
      flex: 0 0 1080px;
      width: 1080px;
      height: 1080px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      position: relative;
    }

    svg {
      width: 100%;
      height: 100%;
      background-color: #FFFFFF;
      display: block;
    }

    ::-webkit-scrollbar {
      height: 16px;
    }

    ::-webkit-scrollbar-track {
      background: #2c2c2c;
      border-radius: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: #00D68F;
      border-radius: 8px;
      border: 3px solid #2c2c2c;
    }
  </style>
</head>

  <script>
    function copySVG(button, slideIndex) {
      const svgElement = document.querySelectorAll('.slide-wrapper svg')[slideIndex];
      const serializer = new XMLSerializer();
      let svgString = serializer.serializeToString(svgElement);
      const tempTextArea = document.createElement('textarea');
      tempTextArea.value = svgString;
      document.body.appendChild(tempTextArea);
      tempTextArea.select();
      document.execCommand('copy');
      document.body.removeChild(tempTextArea);

      const originalText = button.innerText;
      button.innerText = "¡Copiado! ✅";
      button.style.backgroundColor = "#FDE047";
      setTimeout(() => {
        button.innerText = originalText;
        button.style.backgroundColor = "#4A90FF";
      }, 2000);
    }
  </script>
