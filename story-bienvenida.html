<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Logika — Story Bienvenida</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #2a2a2a;
        }

        .post {
            width: 1080px;
            height: 1920px;
        }
    </style>
</head>

<body>
    <div class="post">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
            <defs>
                <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
                    <circle cx="14" cy="14" r="1.8" fill="#1A1A1A" opacity="0.06" />
                </pattern>
                <filter id="hardShadow" x="-10%" y="-10%" width="130%" height="130%">
                    <feOffset dx="5" dy="5" />
                    <feFlood flood-color="#1A1A1A" flood-opacity="1" />
                    <feComposite in2="SourceGraphic" operator="out" />
                    <feMerge>
                        <feMergeNode />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <filter id="hardShadowSmall" x="-10%" y="-10%" width="130%" height="130%">
                    <feOffset dx="3" dy="3" />
                    <feFlood flood-color="#1A1A1A" flood-opacity="1" />
                    <feComposite in2="SourceGraphic" operator="out" />
                    <feMerge>
                        <feMergeNode />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>

            <!-- ============ FONDO ============ -->
            <rect width="1080" height="1920" fill="#FFF9F0" />
            <rect width="1080" height="1920" fill="url(#dots)" />

            <!-- ============ FORMAS GRANDES ============ -->
            <circle cx="1080" cy="0" r="400" fill="#8523E1" opacity="0.06" />
            <circle cx="0" cy="1920" r="350" fill="#00D68F" opacity="0.07" />
            <circle cx="1000" cy="1500" r="250" fill="none" stroke="#4A90FF" stroke-width="30" opacity="0.05" />
            <rect x="-100" y="400" width="300" height="300" rx="12" fill="#FF6B6B" opacity="0.04"
                transform="rotate(-18, 50, 550)" />
            <circle cx="100" cy="1600" r="180" fill="#FDE047" opacity="0.05" />

            <!-- ============ FORMAS MEDIANAS ============ -->
            <!-- Estrella arriba izquierda -->
            <path d="M100,200 L108,180 L116,200 L136,192 L116,200 L108,220 L100,200 L80,192 Z" fill="#FDE047"
                opacity="0.45" />
            <!-- Cruz derecha -->
            <g transform="translate(960, 500) rotate(15)">
                <line x1="-20" y1="0" x2="20" y2="0" stroke="#FF6B6B" stroke-width="4" opacity="0.3" />
                <line x1="0" y1="-20" x2="0" y2="20" stroke="#FF6B6B" stroke-width="4" opacity="0.3" />
            </g>
            <!-- Cuadrado rotado -->
            <rect x="130" y="1350" width="30" height="30" rx="4" fill="none" stroke="#8523E1" stroke-width="3"
                opacity="0.25" transform="rotate(35, 145, 1365)" />
            <!-- Círculos -->
            <circle cx="950" cy="300" r="16" fill="#00D68F" opacity="0.3" />
            <circle cx="180" cy="900" r="10" fill="#4A90FF" opacity="0.2" />
            <circle cx="900" cy="1100" r="8" fill="#FDE047" opacity="0.3" />
            <circle cx="100" cy="1100" r="12" fill="#FF6B6B" opacity="0.2" />
            <!-- Sparkles arriba centro -->
            <g transform="translate(540, 150)" opacity="0.2">
                <line x1="-12" y1="0" x2="12" y2="0" stroke="#8523E1" stroke-width="3" />
                <line x1="0" y1="-12" x2="0" y2="12" stroke="#8523E1" stroke-width="3" />
                <line x1="-8" y1="-8" x2="8" y2="8" stroke="#8523E1" stroke-width="2.5" />
                <line x1="8" y1="-8" x2="-8" y2="8" stroke="#8523E1" stroke-width="2.5" />
            </g>
            <!-- Zigzag izquierdo -->
            <path d="M50,750 L70,730 L90,750 L110,730 L130,750" fill="none" stroke="#4A90FF" stroke-width="3"
                opacity="0.12" stroke-linecap="round" />
            <!-- Anillo dash -->
            <circle cx="950" cy="800" r="50" fill="none" stroke="#FF6B6B" stroke-width="3" stroke-dasharray="8 6"
                opacity="0.12" />
            <!-- Triángulo borde derecho -->
            <polygon points="1030,700 1080,740 1030,780" fill="#FDE047" opacity="0.12" />
            <!-- Estrella abajo -->
            <path d="M800,1650 L808,1630 L816,1650 L836,1642 L816,1650 L808,1670 L800,1650 L780,1642 Z" fill="#00D68F"
                opacity="0.35" />
            <!-- Otro zigzag abajo derecha -->
            <path d="M850,1400 L870,1380 L890,1400 L910,1380" fill="none" stroke="#8523E1" stroke-width="3"
                opacity="0.1" stroke-linecap="round" />

            <!-- ============ DETALLES DE BORDE ============ -->
            <g transform="translate(1000, 120)">
                <line x1="0" y1="0" x2="50" y2="0" stroke="#1A1A1A" stroke-width="3" opacity="0.1" />
                <line x1="50" y1="0" x2="50" y2="50" stroke="#1A1A1A" stroke-width="3" opacity="0.1" />
            </g>
            <g transform="translate(1010, 1750)">
                <circle cx="0" cy="0" r="4" fill="#1A1A1A" opacity="0.1" />
                <circle cx="16" cy="0" r="4" fill="#1A1A1A" opacity="0.1" />
                <circle cx="0" cy="16" r="4" fill="#1A1A1A" opacity="0.1" />
            </g>
            <rect x="0" y="600" width="6" height="250" fill="#8523E1" opacity="0.12" />
            <rect x="1074" y="1200" width="6" height="200" fill="#00D68F" opacity="0.12" />
            <line x1="750" y1="200" x2="980" y2="200" stroke="#1A1A1A" stroke-width="2" stroke-dasharray="10 8"
                opacity="0.07" />

            <!-- ============ CONTENIDO ============ -->

            <!-- Badge "ESTO RECIÉN EMPIEZA" -->
            <g transform="translate(330, 450) rotate(-2)">
                <rect x="0" y="0" width="420" height="62" rx="31" fill="#FDE047" stroke="#1A1A1A" stroke-width="3.5"
                    filter="url(#hardShadowSmall)" />
                <text x="210" y="40" font-family="'Space Grotesk', sans-serif" fill="#1A1A1A" font-size="24"
                    font-weight="700" text-anchor="middle" letter-spacing="2.5">✨ ESTO RECIÉN EMPIEZA</text>
            </g>

            <!-- LOGO LOGIKA ENORME -->
            <g transform="translate(255, 600) scale(5.5)">
                <defs>
                    <clipPath id="woven-clip-story">
                        <rect x="45" y="0" width="60" height="100" />
                    </clipPath>
                </defs>
                <!-- Sombra -->
                <rect x="22" y="22" width="62" height="62" rx="6" fill="#1A1A1A" />
                <!-- Top (Violet) -->
                <rect x="14" y="14" width="62" height="22" rx="6" fill="#8523E1" stroke="#1A1A1A" stroke-width="4" />
                <!-- Left (Blue) -->
                <rect x="14" y="14" width="22" height="62" rx="6" fill="#4A90FF" stroke="#1A1A1A" stroke-width="4" />
                <!-- Bottom (Coral) -->
                <rect x="14" y="54" width="62" height="22" rx="6" fill="#FF6B6B" stroke="#1A1A1A" stroke-width="4" />
                <!-- Right (Mint) -->
                <rect x="54" y="14" width="22" height="62" rx="6" fill="#00D68F" stroke="#1A1A1A" stroke-width="4" />
                <!-- Top Patch -->
                <rect x="14" y="14" width="62" height="22" rx="6" fill="#8523E1" stroke="#1A1A1A" stroke-width="4"
                    clip-path="url(#woven-clip-story)" />
            </g>

            <!-- Sparkles alrededor del logo -->
            <g opacity="0.55">
                <path d="M220,770 L205,755 M220,770 L205,785 M220,770 L188,770" stroke="#FDE047" stroke-width="4"
                    stroke-linecap="round" />
                <path d="M860,700 L875,685 M860,700 L875,715 M860,700 L892,700" stroke="#00D68F" stroke-width="4"
                    stroke-linecap="round" />
                <path d="M830,610 L845,595 M830,610 L845,625" stroke="#FF6B6B" stroke-width="3.5"
                    stroke-linecap="round" />
                <path d="M240,1050 L225,1035 M240,1050 L225,1065" stroke="#4A90FF" stroke-width="3.5"
                    stroke-linecap="round" />
                <path d="M870,1000 L885,985 M870,1000 L885,1015" stroke="#8523E1" stroke-width="3"
                    stroke-linecap="round" />
            </g>

            <!-- "BIENVENIDOS A" -->
            <text x="540" y="1200" font-family="'Space Grotesk', sans-serif" fill="#6B6B6B" font-size="42"
                font-weight="600" text-anchor="middle" letter-spacing="8">BIENVENIDOS A</text>

            <!-- "LOGIKA" -->
            <text x="540" y="1310" font-family="'Space Grotesk', sans-serif" fill="#1A1A1A" font-size="120"
                font-weight="800" text-anchor="middle" letter-spacing="-2">LOGIKA</text>

            <!-- Línea violeta -->
            <line x1="380" y1="1350" x2="700" y2="1350" stroke="#8523E1" stroke-width="5" stroke-linecap="round" />

            <!-- CTA: logikaweb.com.ar -->
            <g transform="translate(540, 1430)">
                <rect x="-180" y="0" width="360" height="58" rx="29" fill="#8523E1" stroke="#1A1A1A" stroke-width="3"
                    filter="url(#hardShadowSmall)" />
                <text x="0" y="38" font-family="'Space Grotesk', sans-serif" fill="#FFFFFF" font-size="24"
                    font-weight="700" text-anchor="middle" letter-spacing="0.5">👉 logikaweb.com.ar</text>
            </g>

            <!-- CTA: Escribinos -->
            <g transform="translate(540, 1520)">
                <rect x="-160" y="0" width="320" height="58" rx="29" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="3"
                    filter="url(#hardShadowSmall)" />
                <text x="0" y="38" font-family="'Space Grotesk', sans-serif" fill="#1A1A1A" font-size="22"
                    font-weight="700" text-anchor="middle" letter-spacing="0.5">📲 Escribinos por DM</text>
            </g>

            <!-- ============ FOOTER MINI ============ -->
            <g transform="translate(540, 1780)">
                <!-- Logo chico -->
                <g transform="translate(-120, -15) scale(0.45)">
                    <path fill="#1A1A1A"
                        d="M 28 22 h 50 a 6 6 0 0 1 6 6 v 50 a 6 6 0 0 1 -6 6 h -50 a 6 6 0 0 1 -6 -6 v -50 a 6 6 0 0 1 6 -6 Z M 44 44 v 18 h 18 v -18 h -18 Z" />
                    <path fill="#8523E1" d="M 14 20 a 6 6 0 0 1 6 -6 h 50 a 6 6 0 0 1 6 6 v 16 h -62 Z" />
                    <path fill="#00D68F" d="M 76 36 v 34 a 6 6 0 0 1 -6 6 h -16 v -40 h 22 Z" />
                    <path fill="#FF6B6B" d="M 54 76 h -34 a 6 6 0 0 1 -6 -6 v -16 h 40 Z" />
                    <rect x="14" y="36" width="22" height="18" fill="#4A90FF" />
                    <rect x="14" y="14" width="62" height="62" rx="6" fill="none" stroke="#1A1A1A" stroke-width="4" />
                    <rect x="36" y="36" width="18" height="18" fill="none" stroke="#1A1A1A" stroke-width="4"
                        stroke-linejoin="round" />
                    <line x1="14" y1="36" x2="36" y2="36" stroke="#1A1A1A" stroke-width="4" />
                    <line x1="54" y1="36" x2="76" y2="36" stroke="#1A1A1A" stroke-width="4" />
                    <line x1="14" y1="54" x2="36" y2="54" stroke="#1A1A1A" stroke-width="4" />
                    <line x1="54" y1="54" x2="54" y2="76" stroke="#1A1A1A" stroke-width="4" />
                </g>
                <text x="-70" y="25" font-family="'Space Grotesk', sans-serif" fill="#1A1A1A" font-size="26"
                    font-weight="800" letter-spacing="-0.5">LOGIKA</text>
                <circle cx="30" cy="18" r="3" fill="#6B6B6B" opacity="0.3" />
                <text x="45" y="25" font-family="'Space Grotesk', sans-serif" fill="#6B6B6B" font-size="20"
                    font-weight="600">logikaweb.com.ar</text>
            </g>

        </svg>
    </div>
</body>

</html>
